agent:
  name: {{AGENT_NAME}}
  version: "0.1.0"

model:
  provider: openrouter
  id: meta-llama/llama-3.3-70b-instruct
  max_tokens: 131072
  max_retries: 2
  # timeout_ms: 60000

runtime:
  scratchpad_budget: 5000
  quiet_hours:
    start: 23
    end: 6
  timezone: America/New_York

memory:
  session_retention_days: 7
  journal_retention_days: 365

channels:
  primary: cli

extensions:
  directories: []

