name: Release

on:
  push:
    tags: ['v*']

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # required for creating GitHub Releases
      id-token: write  # required for npm provenance

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Lint (typecheck)
        run: npm run lint

      - name: Verify CLI entry point
        run: node dist/cli/index.js --version

      - name: Publish to npm with provenance
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Resolve npm version (strip v prefix)
        id: npm_version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          body: |
            **npm:** [`@agntk/agent-harness@${{ steps.npm_version.outputs.version }}`](https://www.npmjs.com/package/@agntk/agent-harness/v/${{ steps.npm_version.outputs.version }})

            **Install:** `npm install -g @agntk/agent-harness@${{ steps.npm_version.outputs.version }}`

            ---
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
