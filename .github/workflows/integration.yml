name: Integration (Ollama)

# Runs the learning-loop end-to-end test against a real local Ollama instance.
# This is the SAFETY NET for the harness's headline feature — without it, the
# learning loop could regress silently across releases (it has, before this
# workflow existed).
#
# The job:
#   1. Spins up Ubuntu, installs Node 22 + Ollama
#   2. Pulls the test model (cached across runs to avoid 1.4 GB download every time)
#   3. Starts ollama serve in the background
#   4. Builds the harness, runs `INTEGRATION=1 npm test` against tests/integration/
#   5. Uploads the test scratch dir as an artifact on failure for post-mortem
#
# Triggers:
#   - On every push to main (post-merge safety net — catches anything that
#     slipped through PR review)
#   - On every pull_request to main (catches breakage before merge)
#   - On every tag push (release gate — a broken learning loop blocks publish)
#   - manual via workflow_dispatch (debug)
#
# Cost: $0. Runs on GitHub's standard runners. Total time per run is roughly
#       3-5 minutes including model warm-up — most of which is the integration
#       test itself doing 7+ LLM calls plus journal synthesis plus learn.
#
# Failure mode: if this workflow goes red, the learning loop is broken in a
# way the unit tests didn't catch. Treat it as a release blocker.

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-progress runs of this workflow on the same ref when a new commit
# lands. Save runner minutes and only verify the latest tip.
concurrency:
  group: integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  learning-loop:
    name: Learning loop end-to-end
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      # The model the integration test uses. Small (1.4 GB) and fast enough
      # for the 7-prompt + journal + learn pipeline to finish in ~60 seconds
      # on standard runners. If you change this, also update the cache key
      # below so the cache invalidates.
      OLLAMA_TEST_MODEL: 'qwen3:1.7b'
      # Where the test probes Ollama's NATIVE API to check model availability.
      OLLAMA_NATIVE_URL: 'http://localhost:11434'
      # OpenAI-compatible endpoint the harness's provider uses. Must end in /v1
      # because the OpenAI SDK appends /chat/completions to the baseURL. Getting
      # this wrong silently produces 404s from inside the LLM call (we hit this
      # bug during development — see CLAUDE.md testing gotchas).
      OLLAMA_BASE_URL: 'http://localhost:11434/v1'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build harness
        run: npm run build

      - name: Run unit tests (sanity check before integration)
        run: npm test

      # ---------------------------------------------------------------------
      # Ollama setup. The model cache is the most important optimization here:
      # without it every run downloads 1.4 GB which both slows the workflow
      # and burns the GitHub Actions egress quota.
      #
      # Cache key includes the model name so changing OLLAMA_TEST_MODEL above
      # will naturally invalidate the cache and pull the new model on the
      # first run after the change.
      # ---------------------------------------------------------------------

      - name: Restore Ollama model cache
        id: ollama-cache
        uses: actions/cache@v4
        with:
          path: ~/.ollama
          key: ollama-${{ runner.os }}-${{ env.OLLAMA_TEST_MODEL }}

      - name: Install Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama --version

      - name: Start Ollama service
        run: |
          # ollama serve runs in the foreground, so we background it and
          # then poll the native API endpoint until it's ready (or fail
          # fast after 30 seconds so we don't hang the workflow).
          ollama serve > /tmp/ollama.log 2>&1 &
          for i in {1..30}; do
            if curl -sf "${OLLAMA_NATIVE_URL}/api/tags" > /dev/null 2>&1; then
              echo "Ollama ready after ${i}s"
              break
            fi
            sleep 1
          done
          curl -sf "${OLLAMA_NATIVE_URL}/api/tags" > /dev/null || {
            echo "ERROR: Ollama did not start within 30s"
            cat /tmp/ollama.log
            exit 1
          }

      - name: Pull test model (skipped on cache hit)
        run: |
          # If the cache restored the model already, this is essentially a
          # no-op manifest fetch. Otherwise it downloads the full 1.4 GB.
          ollama pull "${OLLAMA_TEST_MODEL}"
          ollama list

      - name: Warm up the model (cold-start can exceed test timeouts)
        run: |
          # The first inference call to a freshly-pulled model has to load
          # the weights into RAM, which can take 30+ seconds on standard
          # runners — longer than the harness's max_retries window. Pre-warm
          # the model with a trivial inference so the integration test's
          # first real call uses the in-memory model. Also serves as a
          # smoke test that the OpenAI-compat endpoint at /v1 actually works
          # before we run a real test against it.
          echo "Warming up ${OLLAMA_TEST_MODEL}..."
          time ollama run "${OLLAMA_TEST_MODEL}" "Say hi" --verbose 2>&1 | tail -20
          echo ""
          echo "Verifying OpenAI-compat endpoint at ${OLLAMA_BASE_URL}..."
          curl -sf "${OLLAMA_BASE_URL}/models" | head -20
          echo ""
          echo "Smoke-testing chat completions..."
          curl -sf "${OLLAMA_BASE_URL}/chat/completions" \
            -H "Content-Type: application/json" \
            -d "{\"model\":\"${OLLAMA_TEST_MODEL}\",\"messages\":[{\"role\":\"user\",\"content\":\"Say hi\"}]}" \
            | head -50
          echo ""

      - name: Run integration tests
        env:
          INTEGRATION: '1'
        run: npm test -- tests/integration/

      # ---------------------------------------------------------------------
      # On failure, dump diagnostic info so post-mortem doesn't require
      # re-running locally. The most common failures will be:
      #   - Ollama startup race (caught by the readiness loop above)
      #   - Model timeout under load (the 60s/600s test timeouts may be tight)
      #   - Real regression in the learning loop pipeline
      # ---------------------------------------------------------------------

      - name: Dump Ollama logs on failure
        if: failure()
        run: |
          echo "=== ollama.log ==="
          cat /tmp/ollama.log || true
          echo "=== ollama list ==="
          ollama list || true
          echo "=== ollama ps ==="
          ollama ps || true
